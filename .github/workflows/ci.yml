name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

# Cancel in-progress runs for the same PR to avoid wasted CI minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # JOB 1: Migration Check
  # Fails if any model change was made without a corresponding migration.
  # This enforces the CONTRIBUTING.md rule: "Every model change requires
  # a new migration committed alongside it."
  # ─────────────────────────────────────────────────────────────────────
  migration-check:
    name: Migration Check
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: ci-migration-check-key
      DEBUG: "True"
      ALLOWED_HOSTS: localhost
      PAYSTACK_SECRET_KEY: sk_test_placeholder
      CLOUDINARY_URL: cloudinary://placeholder:placeholder@placeholder
      JWT_ACCESS_TOKEN_LIFETIME_MINUTES: 60
      JWT_REFRESH_TOKEN_LIFETIME_DAYS: 7

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check for missing migrations
        working-directory: backend
        run: |
          python manage.py makemigrations --check --dry-run
        # --check exits with a non-zero code if any migrations are missing.
        # --dry-run ensures nothing is written to disk.
        # If this fails: run `python manage.py makemigrations` locally,
        # commit the generated file, and push again.

      - name: Verify all migrations apply cleanly
        working-directory: backend
        run: python manage.py migrate --noinput --run-syncdb

  # ─────────────────────────────────────────────────────────────────────
  # JOB 2: Backend Tests
  # Runs the full Django test suite (35 tests across 6 apps) using SQLite.
  # Also runs `manage.py check` to catch settings/config errors.
  # ─────────────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: migration-check

    env:
      SECRET_KEY: ci-test-secret-key-not-for-production
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
      PAYSTACK_SECRET_KEY: sk_test_placeholder
      CLOUDINARY_URL: cloudinary://placeholder:placeholder@placeholder
      JWT_ACCESS_TOKEN_LIFETIME_MINUTES: 60
      JWT_REFRESH_TOKEN_LIFETIME_DAYS: 7

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django system check
        working-directory: backend
        run: python manage.py check --deploy 2>&1 | grep -v "WARNINGS" || true
        # Runs Django's full deployment checklist. Known non-fatal warnings
        # (HTTPS, HSTS) are expected in CI — only errors will fail the build.

      - name: Run test suite
        working-directory: backend
        run: python manage.py test --verbosity=2 --failfast
        # --failfast stops on the first failure so you see the root cause
        # without scrolling through cascading failures.

  # ─────────────────────────────────────────────────────────────────────
  # JOB 3: Frontend Lint
  # Runs `next lint` — enforces ESLint rules from eslint-config-next
  # (core-web-vitals preset). This is a hard failure, not || true.
  # Fix lint errors before merging, per CONTRIBUTING.md frontend conventions.
  # ─────────────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: my-app/package-lock.json

      - name: Install dependencies
        working-directory: my-app
        run: npm ci

      - name: Lint (next lint — core-web-vitals preset)
        working-directory: my-app
        run: npm run lint
        # Uses `next lint` which scans app/, context/, utils/, middleware.js.
        # Enforces: no unused vars, no missing keys in lists, no direct
        # <img> tags (use next/image), no <a> wrapping <Link>, etc.
        # Fix errors: npx next lint --fix

  # ─────────────────────────────────────────────────────────────────────
  # JOB 4: Frontend Build
  # Runs `next build` (production build). This catches:
  #   - TypeScript/JSX compile errors
  #   - Missing imports or bad module paths
  #   - next/image or next/font misconfigurations
  #   - Any page that throws during static generation
  # Runs after lint to avoid running an expensive build on linting failures.
  # ─────────────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: my-app/package-lock.json

      - name: Install dependencies
        working-directory: my-app
        run: npm ci

      - name: Create CI environment
        working-directory: my-app
        run: |
          cat > .env.local << 'EOF'
          NEXT_PUBLIC_API_URL=http://localhost:8000/api
          EOF

      - name: Production build
        working-directory: my-app
        run: npm run build

      - name: Report bundle size
        working-directory: my-app
        if: always()
        run: |
          if [ -f .next/build-manifest.json ]; then
            echo "### Next.js Build Summary" >> $GITHUB_STEP_SUMMARY
            echo "Build succeeded. Pages:" >> $GITHUB_STEP_SUMMARY
            cat .next/build-manifest.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          pages = list(data.get('pages', {}).keys())
          for p in sorted(pages):
              print(f'  - {p}')
            " >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          fi
