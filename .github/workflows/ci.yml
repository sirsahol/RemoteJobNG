name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: remoteworknaija_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ci-test-secret-key-not-for-production
      DEBUG: "True"
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/remoteworknaija_test
      ALLOWED_HOSTS: localhost,127.0.0.1
      PAYSTACK_SECRET_KEY: sk_test_placeholder
      CLOUDINARY_URL: cloudinary://placeholder:placeholder@placeholder
      JWT_ACCESS_TOKEN_LIFETIME_MINUTES: 60
      JWT_REFRESH_TOKEN_LIFETIME_DAYS: 7

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django system check
        working-directory: backend
        run: python manage.py check

      - name: Run migrations
        working-directory: backend
        run: python manage.py migrate --noinput

      - name: Run tests
        working-directory: backend
        run: python manage.py test --verbosity=2

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: my-app/package-lock.json

      - name: Install dependencies
        working-directory: my-app
        run: npm ci

      - name: Create .env.local for CI
        working-directory: my-app
        run: echo "NEXT_PUBLIC_API_URL=http://localhost:8000" > .env.local

      - name: Build
        working-directory: my-app
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api
        run: npm run build

      - name: Lint
        working-directory: my-app
        run: npm run lint || true
